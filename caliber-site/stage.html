<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALIBER — Demo Stage</title>
<style>
  :root{
    --bg:#080706;--gold:#c9a15a;--txt:#f3ece0;--mut:#9b9083;--line:rgba(201,161,90,.18);
    --font:"Segoe UI",-apple-system,Roboto,Helvetica,Arial,sans-serif;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:radial-gradient(120% 90% at 50% 0,#191510,var(--bg));
    color:var(--txt);font-family:var(--font);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:22px;padding:26px}

  .head{display:flex;align-items:center;gap:14px}
  .head svg{width:34px;height:34px}
  .head .t{font-family:var(--serif);font-size:22px;letter-spacing:6px}
  .head .s{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);
    padding-left:14px;margin-left:4px;border-left:1px solid var(--line)}

  .stage{display:flex;align-items:center;gap:40px}

  /* the laptop */
  .mac{width:1180px;flex:0 0 auto}
  .mac .screen{position:relative;border-radius:12px;overflow:hidden;
    border:10px solid #1a1815;box-shadow:0 40px 90px rgba(0,0,0,.7),0 0 0 1px rgba(201,161,90,.16)}
  .mac .bar{height:26px;background:#14120f;display:flex;align-items:center;gap:6px;padding:0 12px;
    border-bottom:1px solid rgba(255,255,255,.05)}
  .dot{width:9px;height:9px;border-radius:50%}
  .mac iframe{display:block;width:1160px;height:720px;border:0;background:#0b0a09}
  .mac .foot{height:12px;margin:0 auto;width:70%;
    background:linear-gradient(180deg,#211d18,#0e0c0a);border-radius:0 0 14px 14px}

  /* the phone */
  .phone{width:392px;flex:0 0 auto;position:relative}
  .phone .body{position:relative;border-radius:46px;padding:12px;
    background:linear-gradient(160deg,#26221c,#0f0d0b);
    box-shadow:0 40px 90px rgba(0,0,0,.75),0 0 0 1px rgba(201,161,90,.18)}
  .phone .notch{position:absolute;left:50%;top:16px;transform:translateX(-50%);
    width:120px;height:26px;border-radius:999px;background:#080706;z-index:3}
  .phone iframe{display:block;width:368px;height:760px;border:0;border-radius:36px;background:#0b0a09}

  .lbl{text-align:center;margin-top:14px;font-size:10.5px;letter-spacing:3.5px;
    text-transform:uppercase;color:var(--mut)}

  .hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);
    font-size:11px;color:#5f564c;letter-spacing:2px;text-transform:uppercase}
  .hint b{color:var(--gold)}
  @media(max-width:1700px){
    .stage{transform:scale(.78);transform-origin:center}
  }
  @media(max-width:1380px){ .stage{transform:scale(.62)} }
</style>
</head>
<body>

  <div class="head">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="18" fill="#0d0b0a"/>
      <rect x="14" y="14" width="72" height="72" rx="10" fill="#f3ece0"/>
      <path d="M14 78 A10 10 0 0 0 24 86 H76 L14 60 Z" fill="#c9a15a" opacity=".22"/>
      <path d="M66 33 A24 24 0 1 0 66 67 L66 55 A13 13 0 1 1 66 45 Z" fill="#0d0b0a"/>
      <rect x="60" y="45" width="26" height="10" fill="#0d0b0a"/>
      <rect x="60" y="45" width="26" height="4" fill="#c9a15a"/>
    </svg>
    <span class="t">CALIBER</span>
    <span class="s">Learn it · Collect it · Wear it</span>
  </div>

  <div class="stage">
    <div class="mac">
      <div class="screen">
        <div class="bar">
          <span class="dot" style="background:#e06c60"></span>
          <span class="dot" style="background:#e0b95e"></span>
          <span class="dot" style="background:#6bbf7a"></span>
        </div>
        <iframe id="desk" src="index.html?tour=1" title="CALIBER on desktop"></iframe>
      </div>
      <div class="foot"></div>
      <div class="lbl">Desktop</div>
    </div>

    <div class="phone">
      <div class="body">
        <div class="notch"></div>
        <iframe id="mob" src="index.html?tour=1&m=1" title="CALIBER on mobile"></iframe>
      </div>
      <div class="lbl">Mobile</div>
    </div>
  </div>

  <div class="hint">Press <b>R</b> to restart both · <b>Esc</b> inside a pane to take over</div>

<script>
  /* Restart both panes together, so a re-take is one keystroke. */
  addEventListener("keydown", e=>{
    if(e.key.toLowerCase() === "r"){
      document.getElementById("desk").contentWindow.location.reload();
      document.getElementById("mob").contentWindow.location.reload();
    }
  });
</script>
</body>
</html>
